<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entre no POA</title>
    <link
      rel="shortcut icon"
      href="../assets/favicon.png"
      type="image/x-icon"
    />

    <!-- link css -->
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/entrar.css" />
  </head>
  <body>
    <main class="container">
      <!-- content do formulário -->
      <div class="content content-form">
        <!-- texto call to action (cta) -->
        <div class="cta-container">
          <h2>Entrar na sua conta</h2>
          <p>
            Entre em sua conta para encontrar e publicar projetos no Portal de
            Oportunidades Acadêmicas
          </p>
        </div>

        <!-- formulario -->
        <form action="">
          <!-- email -->
          <div class="form-item">
            <label for="email">E-mail</label>
            <input type="email" />
          </div>
          <!-- senha -->
          <div class="form-item">
            <label for="senha">Senha</label>
            <input type="password" />
          </div>

          <button type="submit">Entrar</button>
        </form>

        <!-- prompt para fazer login -->
        <div class="prompt">
          <p>
            Não possui uma conta?
            <span>
              <a href="#">Crie uma conta </a>
            </span>
          </p>
        </div>
      </div>

      <!-- content com imagem e mensagem -->
      <div class="content">
        <div class="logo">
          <img
            src="../assets/logo.png"
            alt="Logo Portal de Oportunidades Acadêmicas"
          />
        </div>
        <h2>
          Portal de Oportunidades Acadêmicas permite encontrar e publicar
          projetos no mesmo lugar
        </h2>
        <div class="graphic-element">
          <img
            src="../assets/cadastrar-entrar/cellphone.png"
            alt="Animação gráfica de um telefone móvel"
          />
        </div>
      </div>

      <div class="shadow-wrapper">
        <div class="shadow"></div>
        <div class="shadow"></div>
      </div>
    </main>

    <script src="../script/main.js"></script>
  </body>
</html>
