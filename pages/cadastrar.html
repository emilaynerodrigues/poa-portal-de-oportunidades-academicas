<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastra-se no POA</title>
    <link
      rel="shortcut icon"
      href="../assets/favicon.png"
      type="image/x-icon"
    />

    <!-- link css -->
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/cadastrar.css" />
  </head>
  <body>
    <main class="container">
      <!-- content com imagem e mensagem -->
      <div class="content">
        <div class="logo">
          <img
            src="../assets/logo.png"
            alt="Logo Portal de Oportunidades Acadêmicas"
          />
        </div>
        <h2>
          Portal de Oportunidades Acadêmicas permite encontrar e publicar
          projetos no mesmo lugar
        </h2>
        <div class="graphic-element">
          <img
            src="../assets/cadastrar-entrar/computer.png"
            alt="Animação gráfica de computador desktop"
          />
        </div>
      </div>

      <!-- content do formulário -->
      <div class="content content-form">
        <!-- texto call to action (cta) -->
        <div class="cta-container">
          <h2>Criar conta</h2>
          <p>
            Crie uma conta para encontrar e publicar projetos no Portal de
            Oportunidades Acadêmicas
          </p>
        </div>

        <!-- formulario -->
        <form action="">
          <div class="name-item">
            <!-- nome -->
            <div class="form-item">
              <label for="nome">Nome</label>
              <input type="text" />
            </div>
            <!-- sobrenome -->
            <div class="form-item">
              <label for="sobrenome">Sobrenome</label>
              <input type="text" />
            </div>
          </div>
          <!-- email -->
          <div class="form-item">
            <label for="email">E-mail</label>
            <input type="email" />
          </div>
          <!-- senha -->
          <div class="form-item">
            <label for="senha">Senha</label>
            <input type="password" />
          </div>
          <!-- tipo de usuario -->
          <div class="form-item">
            <label for="usuario">Tipo de Usuário</label>
            <select name="" id="">
              <option value="">Selecione</option>
              <option value="aluno">Aluno</option>
              <option value="recrutador">Recrutador</option>
            </select>
          </div>

          <button type="submit">Criar Conta</button>
        </form>

        <!-- prompt para fazer login -->
        <div class="prompt">
          <p>
            Já possui uma conta?
            <span>
              <a href="#">Faça login</a>
            </span>
          </p>
        </div>
      </div>

      <div class="shadow-wrapper">
        <div class="shadow"></div>
        <div class="shadow"></div>
      </div>
    </main>

    <script src="../script/main.js"></script>
  </body>
</html>
