<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Oportunidades Acadêmicas</title>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon" />

    <!-- link css -->
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/inicio.css" />
  </head>
  <body>
    <div class="container">
      <!-- cabeçalho -->
      <header>
        <div class="logo">
          <img
            src="assets/logo.png"
            alt="Logo Portal de Oportunidades Acadêmicas"
          />
        </div>
        <!-- menu de navegação -->
        <nav class="menu-nav">
          <input type="checkbox" id="check" />
          <label for="check" class="check-btn">
            <span class="hamburger"></span>
          </label>
          <div
            class="nav-list"
            onclick="getElementById('check').checked=false;"
          >
            <a href="#" class="nav-item">como funciona</a>
            <a href="pages/cadastrar.html" class="nav-item">cadastre-se</a>
            <a
              href="#"
              class="nav-item button button-outline"
              style="width: 160px"
              >entrar</a
            >
          </div>
        </nav>
      </header>
      <!-- corpo da pagina -->
      <main>
        <div class="content">
          <!-- content com textos -->
          <div class="hero">
            <!-- texto destaque -->
            <h1 class="highlight-text">
              Encontre e <br />
              publique projetos freelancers, <br />
              tudo online
            </h1>
            <!-- texto comum -->
            <p class="text">
              Plataforma para divulgação e contratação de freelancers para
              estudantes do SENAC
            </p>
            <!-- botões -->
            <div class="buttons">
              <a href="" class="button" style="height: 55px; width: 270px"
                >encontrar projeto</a
              >
              <a
                href=""
                class="button button-outline"
                style="height: 55px; width: 270px"
                >publicar projeto</a
              >
            </div>
          </div>
        </div>

        <!-- imagens absolutas -->
        <div class="hero-img">
          <img
            src="assets/inicio/data.png"
            alt="Animação gráfica de dados"
            srcset=""
          />
          <img
            src="assets/inicio/girl.png"
            alt="Animação gráfica de uma garota"
            srcset=""
          />
          <img
            src="assets/inicio/boy.png"
            alt="Animação gráfica de um garoto"
            srcset=""
          />
          <img
            src="assets/inicio/computer.png"
            alt="Animação gráfica de um computador"
            srcset=""
          />
          <img
            src="assets/inicio/bag.png"
            alt="Animação gráfica de uma sacola"
            srcset=""
          />
          <img
            src="assets/inicio/little-bag.png"
            alt="Animação gráfica de sacolas"
            srcset=""
          />
          <img
            src="assets/inicio/ball.png"
            alt="Animação gráfica de uma esfera"
            srcset=""
          />
        </div>

        <!-- sombras absolutas -->
        <div class="shadow-wrapper">
          <div class="shadow"></div>
          <div class="shadow"></div>
        </div>
      </main>
    </div>
    <script src="script/main.js"></script>
  </body>
</html>
